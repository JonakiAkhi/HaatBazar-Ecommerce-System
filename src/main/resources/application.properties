# ========================== Service Identity ==========================
spring.application.name=NOTIFICATION-SERVICE
server.port=8083

# ========================== MySQL Database ============================
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================== Eureka Registration =======================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ========================== Gmail SMTP ================================
# To use Gmail you need an "App Password" (not your normal Google password).
# Steps: Google Account > Security > 2-Step Verification > App passwords
# Then paste the 16-character app password below.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
